<!DOCTYPE html>
<html lang="es">
<head>
  <script src="https://js.sentry-cdn.com/92f66210517f47ea57bc16e4c05f6c39.min.js" crossorigin="anonymous"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Fluss — Cuenta pendiente</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-logo">F</div>
      <p class="eyebrow">Fluss</p>
      <h1 id="title">Cuenta pendiente</h1>
      <p class="text-muted mt-4" id="message">
        Todavía no encontramos una invitación para tu email. Pedile a tu administrador que te invite a Fluss y volvé
        a intentar.
      </p>
      <button id="retryBtn" class="btn btn-primary btn-lg mt-4">Ya me invitaron, reintentar</button>
      <button id="resendBtn" class="btn btn-secondary mt-4 hidden">Reenviar email de verificación</button>
      <button id="logoutBtn" class="btn btn-ghost mt-4">Cerrar sesión</button>
    </div>
  </div>

  <script type="module">
    import { auth, logout, resolveProfile, homeForRole, resendVerificationEmail } from './js/auth.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const params = new URLSearchParams(window.location.search);
    const resendBtn = document.getElementById('resendBtn');
    if (params.get('verify') === '1') {
      document.getElementById('title').textContent = 'Confirmá tu email';
      document.getElementById('message').textContent =
        'Te enviamos un email de verificación. Abrilo, confirmá tu cuenta y después volvé a esta pantalla.';
      resendBtn.classList.remove('hidden');
    }

    resendBtn.addEventListener('click', async () => {
      const user = auth.currentUser;
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      resendBtn.disabled = true;
      resendBtn.textContent = 'Enviando…';
      try {
        await resendVerificationEmail(user);
        resendBtn.textContent = 'Listo, te lo volvimos a mandar';
      } catch (err) {
        console.error(err);
        resendBtn.disabled = false;
        resendBtn.textContent = 'Reenviar email de verificación';
        if (err.code === 'auth/too-many-requests') {
          alert('Ya lo mandamos hace poco. Esperá un momento antes de volver a pedirlo.');
        } else {
          alert('No se pudo reenviar el email. Probá de nuevo en un momento.');
        }
      }
    });

    document.getElementById('retryBtn').addEventListener('click', async () => {
      const user = auth.currentUser;
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      await user.reload();
      const profile = await resolveProfile(user);
      if (profile && !profile.pendingEmailVerification) {
        window.location.href = homeForRole(profile.role);
      } else {
        alert('Todavía no encontramos tu invitación o falta verificar el email.');
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await logout();
      window.location.href = 'index.html';
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = 'index.html';
    });
  </script>
</body>
</html>
