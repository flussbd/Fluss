name: Deploy Firestore Rules

# Publica firestore.rules a Firebase automáticamente cuando ese archivo
# cambia en la rama main. Reemplaza el paso manual de copiar/pegar el
# archivo en la consola de Firebase.
#
# Requiere un secreto de repo llamado FIREBASE_SERVICE_ACCOUNT con el JSON
# de una cuenta de servicio de Firebase (ver instrucciones en el chat / README).

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
  workflow_dispatch: {} # permite dispararlo a mano desde la pestaña Actions, por las dudas

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install

      - name: Escribir credencial de la cuenta de servicio
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/firebase-sa.json"

      - name: Deploy de firestore.rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: npx firebase-tools deploy --only firestore:rules --project flussbd --non-interactive
